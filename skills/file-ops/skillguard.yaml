name: file-ops
version: 1.0.0
description: Secure file operations for AI agents
author: skillguard-official
license: Apache-2.0

permissions:
  filesystem:
    - path: "${WORKSPACE}/**"
      access: [read, write]
  subprocess: false

adapters:
  openclaw: ">=2.0"
  langchain: ">=0.3"
  mcp: ">=1.0"

build:
  reproducible: true
  base: "skillguard/python:3.11-minimal"

security:
  slsa_level: 3

actions:
  - name: read
    description: Read contents of a file
    parameters:
      path:
        type: string
        description: Relative path to the file
    returns:
      type: string
      description: File contents

  - name: write
    description: Write content to a file
    parameters:
      path:
        type: string
        description: Relative path to the file
      content:
        type: string
        description: Content to write
    returns:
      type: boolean
      description: Success status

  - name: list
    description: List files in a directory
    parameters:
      path:
        type: string
        description: Relative path to the directory
      pattern:
        type: string
        description: Glob pattern to filter files
    returns:
      type: array
      description: List of file paths

  - name: search
    description: Search for text in files
    parameters:
      pattern:
        type: string
        description: Search pattern (regex)
      path:
        type: string
        description: Directory to search in
    returns:
      type: array
      description: List of matches with file and line info

keywords:
  - file
  - filesystem
  - read
  - write
  - search
